services:
  orbit:
    build: .
    container_name: orbit-crm
    ports:
      - "3000:3000"
    volumes:
      - orbit-data:/app/data
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - orbit-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: orbit-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - orbit-net

volumes:
  orbit-data:


networks:
  orbit-net:
